<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Sequences - Records</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="tail.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Quicksand', sans-serif; }
        .title-font { font-family: 'Fredoka One', cursive; }
        .bg-pastel-blue { background-color: #E0F2FE; }
        .bg-pastel-orange { background-color: #FFEDD5; }
        [v-cloak] { display: none; }
    </style>
</head>
<body class="bg-pastel-blue min-h-screen p-4">
    <div id="app" v-cloak class="max-w-2xl mx-auto space-y-6">
        <!-- New Record Form -->
        <div v-if="showSaveForm" class="bg-white rounded-3xl shadow-xl p-8 text-center space-y-4">
            <h2 class="title-font text-3xl text-orange-400">¡JUEGO TERMINADO!</h2>
            <div class="bg-blue-50 p-6 rounded-2xl">
                <p class="text-blue-400 font-bold uppercase tracking-widest text-sm">Tu Puntuación</p>
                <p class="text-4xl title-font text-blue-600">{{ lastScore }}</p>
            </div>
            <p class="text-gray-500">Ingresa tu nombre para guardar tu record:</p>
            <input v-model="playerName" type="text" placeholder="Tu nombre..." 
                    class="w-full text-center py-4 rounded-2xl border-2 border-blue-100 focus:border-blue-300 outline-none text-xl font-bold text-gray-700">
            <button @click="saveRecord" class="w-full bg-orange-400 text-white title-font py-4 rounded-2xl shadow-lg active:scale-95 transition-transform">
                GUARDAR PUNTUACIÓN
            </button>
        </div>

        <!-- Records Table -->
        <div class="bg-white rounded-3xl shadow-xl p-4 space-y-4 flex-grow flex flex-col min-h-0">
            <header class="text-center shrink-0">
                <h1 class="title-font text-2xl text-blue-500">Tabla de Records</h1>
                <p class="text-gray-400 text-[10px] italic">(Menor penalización es mejor)</p>
            </header>

            <div class="overflow-y-auto rounded-2xl border border-gray-100 flex-grow">
                <table class="w-full text-left">
                    <thead class="bg-blue-50 text-blue-600 title-font sticky top-0">
                        <tr>
                            <th class="p-3 text-sm">#</th>
                            <th class="p-3 text-sm">Jugador</th>
                            <th class="p-3 text-sm text-right">Puntos</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-50">
                        <tr v-for="(record, index) in records" :key="index" :class="index === 0 ? 'bg-orange-50/50' : ''">
                            <td class="p-3 font-bold text-gray-400 text-sm">
                                <span v-if="index === 0">🥇</span>
                                <span v-else-if="index === 1">🥈</span>
                                <span v-else-if="index === 2">🥉</span>
                                <span v-else>{{ index + 1 }}</span>
                            </td>
                            <td class="p-3 font-bold text-gray-700 text-sm">{{ record.name }}</td>
                            <td class="p-3 text-right title-font text-blue-500 text-sm">{{ Math.round(record.score) }}</td>
                        </tr>
                        <tr v-if="records.length === 0">
                            <td colspan="3" class="p-8 text-center text-gray-400 italic">No hay records aún. ¡Sé el primero!</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <a href="index.html" class="block w-full text-center bg-blue-500 text-white title-font py-4 rounded-2xl shadow-md active:scale-95 transition-transform shrink-0">
                VOLVER AL MENÚ
            </a>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;

        createApp({
            setup() {
                const records = ref([]);
                const lastScore = ref(localStorage.getItem('lastScore') || 0);
                const showSaveForm = ref(!!localStorage.getItem('lastScore'));
                const playerName = ref('');

                const fetchRecords = () => {
                    const localData = localStorage.getItem('game_records');
                    if (localData) {
                        const parsed = JSON.parse(localData);
                        // Sort ascending: lowest score (penalty) first
                        records.value = parsed.sort((a, b) => a.score - b.score).slice(0, 100);
                    }
                };

                const saveRecord = () => {
                    if (!playerName.value.trim()) return alert("Por favor ingresa un nombre.");
                    
                    const localData = localStorage.getItem('game_records');
                    let currentRecords = localData ? JSON.parse(localData) : [];
                    
                    currentRecords.push({ 
                        name: playerName.value, 
                        score: parseInt(lastScore.value),
                        date: new Date().toISOString()
                    });
                    
                    // Sort and keep top 100
                    currentRecords.sort((a, b) => a.score - b.score);
                    currentRecords = currentRecords.slice(0, 100);
                    
                    localStorage.setItem('game_records', JSON.stringify(currentRecords));
                    localStorage.removeItem('lastScore');
                    showSaveForm.value = false;
                    fetchRecords();
                };

                onMounted(fetchRecords);

                return { records, lastScore, showSaveForm, playerName, saveRecord };
            }
        }).mount('#app');
    </script>
</body>
</html>
